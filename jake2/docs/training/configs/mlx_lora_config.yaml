model:
  base_model: "mlx-community/Llama-3.2-3B-Instruct-4bit"

dataset:
  data_dir: "training/exports/mlx_chat"

training:
  output_dir: "training/output/mlx-jake-lora"
  iters: 300
  batch_size: 1
  learning_rate: 0.0001
  steps_per_report: 10
  steps_per_eval: 50
  save_every: 50
  grad_checkpoint: true
  fine_tune_type: "lora"

notes:
  purpose:
    - "Local Apple Silicon LoRA fine-tuning for Jake's answer style and operator behavior"
  warning:
    - "Do not train changing network facts into weights"
