model:
  base_model: "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
  max_seq_length: 4096
  load_in_4bit: true
  dtype: null

dataset:
  train_path: "training/exports/unsloth_train_messages.jsonl"
  eval_path: "training/exports/unsloth_eval_messages.jsonl"
  text_field: "messages"
  format: "messages"

training:
  output_dir: "training/output/unsloth-jake-lora"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_steps: 10
  max_steps: 250
  learning_rate: 0.0002
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  seed: 3407

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

notes:
  purpose:
    - "Teach Jake answer shape and reasoning order"
    - "Do not encode rapidly changing network facts into weights"
  gate:
    - "Do not bless a model unless the conversational, ops, and reasoning ringers still pass"
