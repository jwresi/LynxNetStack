  V5000: Cambium cnWave V5000 mesh radio node
  V3000: Cambium cnWave V3000 mesh radio node
  cnWave: Cambium cnWave 60GHz mesh platform
  Cambium: Cambium radio equipment generally
  OLT: optical line terminal (fiber headend)
  ONU: optical network unit (fiber subscriber endpoint)
  ONT: optical network unit (fiber subscriber endpoint)
  MikroTik: Router platform running RouterOS
  RouterOS: MikroTik router platform
  SwOS: SwitchOS switch platform
  CSS326: MikroTik SwitchOS switch platform
  CCR2004: MikroTik router model
  RB5009: MikroTik router model

