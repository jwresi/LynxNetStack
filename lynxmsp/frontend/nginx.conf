events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Serve the React app under /crm
        # The outer nginx proxy passes /crm/* here; we strip the prefix
        # with a rewrite so the static files resolve correctly.
        location /crm {
            alias  /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /crm/index.html;
        }

        # API calls proxied to the backend (outer nginx rewrites /crm/api/ → /api/
        # before reaching this container, so these hit bare /api/ here)
        location /api/ {
            proxy_pass http://lynxmsp-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/ {
            proxy_pass http://lynxmsp-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
