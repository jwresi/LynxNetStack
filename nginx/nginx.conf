worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Logging
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ── Upstream services ────────────────────────────────────────────────────
    upstream jake2         { server jake2:8080; }
    upstream lynxmsp_api   { server lynxmsp-backend:8000; }
    upstream provisioner   { server provisioner-backend:5001; }
    upstream stripe_sync   { server netbox-stripe-sync:8080; }
    upstream tikfig        { server tikfig:8080; }

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name jake.lynxnet.co;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name jake.lynxnet.co;

        # Cloudflare origin cert — generated at dash.cloudflare.com
        # → SSL/TLS → Origin Server → Create Certificate
        # Place the two files in nginx/certs/ before building the image.
        ssl_certificate     /etc/nginx/certs/origin.crt;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Only accept traffic from Cloudflare IPs ────────────────────────
        # Update this list periodically from https://www.cloudflare.com/ips-v4
        # Comment out this block to allow direct access (e.g. during setup).
        include /etc/nginx/cloudflare-ips.conf;

        # Pass real visitor IP through from Cloudflare
        real_ip_header    CF-Connecting-IP;

        # ── Jake2: root ────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://jake2;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # WebSocket support (Jake2 live query updates)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── LynxMSP CRM ───────────────────────────────────────────────────────
        # Frontend static files served by lynxmsp-frontend container
        location /crm {
            proxy_pass         http://lynxmsp-frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API calls from lynxmsp frontend → strip /crm prefix before proxying
        location /crm/api/ {
            rewrite ^/crm(/.*)$ $1 break;
            proxy_pass         http://lynxmsp_api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /crm/auth/ {
            rewrite ^/crm(/.*)$ $1 break;
            proxy_pass         http://lynxmsp_api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Provisioner ───────────────────────────────────────────────────────
        location /provision {
            proxy_pass         http://provisioner-frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /provision/api/ {
            rewrite ^/provision(/.*)$ $1 break;
            proxy_pass         http://provisioner;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Billing / Stripe sync ─────────────────────────────────────────────
        location /billing {
            rewrite ^/billing(/.*)$ $1 break;
            proxy_pass         http://stripe_sync;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Tikfig config generator ───────────────────────────────────────────
        location /tikfig {
            rewrite ^/tikfig(/.*)$ $1 break;
            proxy_pass         http://tikfig;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check (unauthenticated, for uptime monitoring) ─────────────
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
