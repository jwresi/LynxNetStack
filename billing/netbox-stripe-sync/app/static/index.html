<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billing Control</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">billingctl</div>
        <div class="subtitle">NetBox + Stripe billing operations</div>
      </header>

      <aside class="sidebar">
        <button class="nav active" data-view="dashboard">Dashboard</button>
        <button class="nav" data-view="customers">Customers</button>
        <button class="nav" data-view="invoices">Invoices</button>
        <button class="nav" data-view="hardware">Hardware Checkout</button>
      </aside>

      <main class="content">
        <section id="view-dashboard" class="view active">
          <h1>Dashboard</h1>
          <div class="cards" id="summary-cards"></div>
        </section>

        <section id="view-customers" class="view">
          <h1>Customers</h1>
          <div id="customers-list" class="table-wrap"></div>
        </section>

        <section id="view-invoices" class="view">
          <h1>Invoices</h1>
          <div id="invoices-list" class="table-wrap"></div>
        </section>

        <section id="view-hardware" class="view">
          <h1>Hardware Checkout</h1>
          <form id="checkout-form" class="panel">
            <label>Device ID <input type="number" name="device_id" required /></label>
            <label>Customer (Tenant)
              <select name="tenant_id" id="tenant-select">
                <option value="">Unassigned</option>
              </select>
            </label>
            <label>Site
              <select name="site_id" id="site-select">
                <option value="">Keep current</option>
              </select>
            </label>
            <label>Note <input type="text" name="note" placeholder="checkout note" /></label>
            <button type="submit">Move Hardware</button>
          </form>
          <div class="panel">
            <h2>Device Search</h2>
            <form id="device-search">
              <input type="text" name="search" placeholder="hostname, serial, etc." />
              <button type="submit">Search</button>
            </form>
            <div id="hardware-list" class="table-wrap"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
